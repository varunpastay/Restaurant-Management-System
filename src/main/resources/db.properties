# =============================================================================
# Database connection settings.
# This is the ONLY place a deploying integrator needs to touch to point the
# application at a restaurant's MySQL instance - no source changes required.
# =============================================================================
db.driver=com.mysql.cj.jdbc.Driver
db.url=jdbc:mysql://localhost:3306/restaurant_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
db.username=root
db.password=CHANGE_ME

# Hand-rolled connection pool sizing (see com.restro.utility.DBConnectionUtil).
db.pool.initialSize=5
db.pool.maxSize=20
db.pool.connectionTimeoutSeconds=10
