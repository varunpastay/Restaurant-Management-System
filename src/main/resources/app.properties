# =============================================================================
# Deployment-level configuration. Restaurant-specific branding (name, logo,
# GST number, tax %, theme color, etc.) lives in the `restaurant` DB table and
# is edited from Admin > Settings at runtime - it does NOT belong here.
# This file holds settings an installer sets once per server/environment.
# =============================================================================

# Absolute filesystem directory where uploaded images are stored (logos,
# banners, category images, food photos, generated QR codes). Kept OUTSIDE
# the deployed WAR on purpose so redeploys/upgrades never wipe restaurant
# content. Must exist and be writable by the servlet container process.
upload.dir=E:/restaurant-uploads

# Public base URL this app is reachable at. Used to build the QR code payload
# printed on table QR codes: {app.base.url}/menu?table={id}&token={qrToken}
app.base.url=http://localhost:8080/restaurant-ordering-system

# Directory holding the mysql / mysqldump client binaries, used by the
# Admin > Backup & Restore feature. Leave blank to resolve from PATH.
# Typical Windows install: C:/Program Files/MySQL/MySQL Server 8.0/bin
mysql.bin.dir=

# Poll interval (seconds) for Kitchen/Counter dashboard AJAX auto-refresh.
dashboard.refresh.interval.seconds=5
