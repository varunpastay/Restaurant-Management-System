# =============================================================================
# java.util.logging configuration (JDK-only, no external logging library).
# Loaded explicitly by com.restro.listeners.AppContextListener on startup so
# behavior is identical regardless of which servlet container is used.
# =============================================================================
handlers=java.util.logging.ConsoleHandler, java.util.logging.FileHandler
.level=INFO

java.util.logging.ConsoleHandler.level=INFO
java.util.logging.ConsoleHandler.formatter=java.util.logging.SimpleFormatter

java.util.logging.FileHandler.level=ALL
java.util.logging.FileHandler.pattern=%h/restaurant-ordering-system-%g.log
java.util.logging.FileHandler.limit=5242880
java.util.logging.FileHandler.count=5
java.util.logging.FileHandler.append=true
java.util.logging.FileHandler.formatter=java.util.logging.SimpleFormatter

java.util.logging.SimpleFormatter.format=%1$tF %1$tT [%4$s] %2$s - %5$s%6$s%n

# Application package logs at FINE so DAO/service tracing is available
# without drowning in container/library noise.
com.restro.level=FINE
